[build]
  functions = "netlify/functions"

# Midlertidig: hindre Google-indeksering mens ny nettside bygges.
# FJERN denne blokken når den nye nettsiden er klar (men behold noindex for oppskriftssidene).
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
